<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Notre Mariage — Trouvez votre table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="decor-line top"></div>

<main class="app">

  <!-- ÉCRAN 1 : recherche du prénom -->
  <section id="screen-search" class="screen active">
    <div class="monogram">✦</div>
    <h1 class="title">Bienvenue</h1>
    <p class="subtitle">Entrez votre prénom pour trouver votre table</p>

    <div class="search-wrap">
      <input
        type="text"
        id="nameInput"
        class="name-input"
        placeholder="Votre prénom..."
        autocomplete="off"
        autocapitalize="words"
        spellcheck="false"
      />
      <ul id="suggestions" class="suggestions"></ul>
    </div>

    <p id="noMatch" class="no-match hidden">Aucun prénom trouvé. Vérifiez l'orthographe ou demandez de l'aide 🙂</p>
  </section>

  <!-- ÉCRAN 2 : résultat + plan -->
  <section id="screen-result" class="screen">
    <button id="backBtn" class="back-btn" aria-label="Retour">← Retour</button>

    <h2 class="greeting">Bonjour <span id="guestName">Prénom</span> !</h2>
    <p class="table-info">
      Votre table : <strong id="tableNumber">—</strong>
      <span id="tableLabel" class="table-label"></span>
    </p>

    <div class="plan-wrap">
      <svg id="planSvg" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" aria-label="Plan de la salle">

        <!-- Fond -->
        <rect x="0" y="0" width="1000" height="600" fill="var(--plan-bg)"/>

        <!-- Terrasse -->
        <rect x="119" y="44" width="100" height="510" class="room-shape terrasse"/>
        <text x="169" y="300" class="room-text" transform="rotate(0 169 300)">Terrasse</text>

        <!-- Mur principal de la salle -->
        <rect x="234" y="44" width="686" height="510" class="room-shape hall"/>

        <!-- Bar / champagne (côté gauche, hors salle) -->
        <rect x="8" y="199" width="80" height="34" class="deco-box"/>
        <text x="48" y="220" class="deco-text">Bar à dessert</text>

        <rect x="2" y="250" width="98" height="34" class="deco-box"/>
        <text x="51" y="271" class="deco-text">Table champagne</text>

        <rect x="2" y="388" width="98" height="34" class="deco-box"/>
        <text x="51" y="409" class="deco-text">Table champagne</text>

        <rect x="8" y="434" width="80" height="34" class="deco-box"/>
        <text x="48" y="455" class="deco-text">Bar à dessert</text>

        <!-- Bar côté droit -->
        <rect x="843" y="237" width="80" height="34" class="deco-box"/>
        <text x="883" y="258" class="deco-text">Bar à dessert</text>

        <!-- Toilettes / cuisine (texte seul, hors salle) -->
        <text x="965" y="175" class="room-label-out">Toilettes</text>
        <text x="965" y="482" class="room-label-out">Cuisine</text>

        <!-- Entrées -->
        <circle cx="234" cy="254" r="5" class="entrance-dot"/>
        <text x="205" y="238" class="room-label-out entrance-label">Entrée</text>
        <circle cx="234" cy="410" r="5" class="entrance-dot"/>
        <text x="205" y="394" class="room-label-out entrance-label">Entrée</text>

        <!-- Repères d'orientation -->
        <text x="577" y="30" class="room-label-out">Côté manoir</text>
        <text x="577" y="592" class="room-label-out">Côté carrière</text>

        <!-- DJ -->
        <rect x="850" y="60" width="70" height="100" class="deco-box dj"/>
        <text x="885" y="115" class="deco-text dj-text">DJ</text>

        <!-- Couches générées en JS -->
        <g id="tables-layer"></g>
        <g id="path-layer"></g>

      </svg>
    </div>

    <p class="hint">📍 Votre table est mise en évidence sur le plan, avec le chemin depuis l'entrée.</p>
  </section>

</main>

<div class="decor-line bottom"></div>

<script src="assets/js/guests.js"></script>
<script src="assets/js/tables.js"></script>
<script src="assets/js/script.js"></script>
</body>
</html>
