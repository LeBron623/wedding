<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Placement — Recherche invité</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="decor-line top"></div>

<main class="app">

  <!-- ÉCRAN 1 : recherche du prénom -->
  <section id="screen-search" class="screen active">
    <nav class="staff-nav"><a href="staff-list.html">Voir la liste complète →</a></nav>
    <div class="monogram">✦</div>
    <h1 class="title">Placement</h1>
    <p class="subtitle">Cherchez le prénom de l'invité</p>

    <div class="search-wrap">
      <input
        type="text"
        id="nameInput"
        class="name-input"
        placeholder="Chargement des invités…"
        autocomplete="off"
        autocapitalize="words"
        spellcheck="false"
        disabled
      />
      <ul id="suggestions" class="suggestions"></ul>
    </div>

    <p id="noMatch" class="no-match hidden">Aucun prénom trouvé. Vérifiez l'orthographe.</p>
    <p id="loadError" class="no-match hidden">Impossible de charger la liste. Vérifiez la connexion internet et rechargez la page.</p>
  </section>

  <!-- ÉCRAN 2 : résultat + plan + validation -->
  <section id="screen-result" class="screen">
    <button id="backBtn" class="back-btn" aria-label="Retour">← Retour</button>

    <h2 class="greeting">Bonjour <span id="guestName">Prénom</span> !</h2>
    <p class="table-info">
      Votre table : <strong id="tableNumber">—</strong>
    </p>

    <div class="seat-status">
      <button id="seatToggleBtn" class="seat-btn">✓ Marquer comme installé(e)</button>
      <p id="seatConfirmed" class="seat-confirmed hidden">
        ✔ Installé(e) à <span id="seatTime"></span>
        <button id="seatUndoBtn" class="seat-undo">annuler</button>
      </p>
    </div>

    <div class="plan-wrap">
      <svg id="planSvg" viewBox="220 30 714 538" xmlns="http://www.w3.org/2000/svg" aria-label="Plan de la salle">

        <!-- Fond -->
        <rect x="220" y="30" width="714" height="538" fill="var(--plan-bg)"/>

        <!-- Mur principal de la salle -->
        <rect x="234" y="44" width="686" height="510" class="room-shape hall"/>

        <!-- Entrée -->
        <circle cx="234" cy="254" r="5" class="entrance-dot"/>
        <text x="266" y="258" class="room-label-out entrance-label">Entrée</text>

        <!-- DJ -->
        <rect x="850" y="60" width="70" height="100" class="deco-box dj"/>
        <text x="885" y="115" class="deco-text dj-text">DJ</text>

        <!-- Couches générées en JS -->
        <g id="tables-layer"></g>
        <g id="path-layer"></g>

      </svg>
    </div>
  </section>

</main>

<div class="decor-line bottom"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/tables.js"></script>
<script src="assets/js/plan.js"></script>
<script src="assets/js/staff.js"></script>
</body>
</html>
